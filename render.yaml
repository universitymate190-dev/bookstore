services:
  - type: web
    name: bookstore
    env: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        fromSecret: secret-key
databases:
  - name: bookstore-db
    plan: starter